<style>
    @keyframes blinkGreen {
        0%   { background: #00ff00; }
        50%  { background: #003300; }
        100% { background: #00ff00; }
    }
    .blink-green {
        animation: blinkGreen 0.8s infinite;
    }

    @keyframes blinkRed {
        0%   { background: #ff0000; }
        50%  { background: #2e0000; }
        100% { background: #ff3333; }
    }
    .blink-red {
        animation: blinkRed 1s infinite;
    }
    

    .bay-card {
        height: 40px;
        background: linear-gradient(90deg, #111 0%, #1a1a1a 50%, #111 100%);
        border: 1px solid #222;
        box-shadow: inset 0 0 5px #000;
        cursor: pointer;
        transition: all .25s ease;
    }

    
    .bay-card:hover {
        border: 1px solid #d9d9d9;
        box-shadow:
        inset 0 0 8px rgba(255,255,255,.15),
        0 0 10px rgba(255,255,255,.35);
        transform: scale(1.03);
    }

</style>
<div hx-get="{% url 'server:get_bay_detail' bay.id %}"
        hx-target="#ModalBayBody"
        hx-swap="innerHTML"
        class="rounded-1 d-flex align-items-center px-2 bay-card"
        id="bay-id-{{ bay.id }}"
    >
    <div class="rounded-circle me-2 {% if bay.is_active %}blink-green{% else %}blink-red{% endif %}" style="width: 6px; height: 6px;">
        <label class="text-secondary" style="font-size: 8px;">{{ bay.watts }}</label>
    </div>
    <div class="rounded-circle me-2" style="width: 6px; height: 6px; background-color: #333;"></div>
    <div class="ms-auto" style="width: 30px; height: 4px; background: #222; border-radius: 2px;"></div>
    <div class="ms-auto d-flex align-items-center gap-1">
        <i class="bi bi-power {% if bay.is_active %}text-success{% else %}text-danger{% endif %}" style="font-size: 14px;"></i>
    </div>
</div>
