version: '3.9'

services:

  django:
    build: .
    container_name: django

    volumes:
      - .:/app

    ports:
      - "8000:8000"
    
    env_file:
      - .env

    depends_on:
      - mysql
  

  mysql:
    image: mysql:8.4

    restart: always

    environment:
      MYSQL_DATABASE: projeto
      MYSQL_ROOT_PASSWORD: root
    
    volumes:
      - mysql_data:/var/lib/mysql
  
  nginx:
    image: nginx:1.28

    ports:
      - "80:80"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

      - ./static:/static

      - ./media:/media

    depends_on:
      - django
  
volumes:
  mysql_data:
  