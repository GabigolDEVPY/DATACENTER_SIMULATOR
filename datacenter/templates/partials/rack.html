<style>
    
    .rack-card {
        transition: all .25s ease;
    }

    .rack-card:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(255,255,255,.1);
    }

</style>

<div class="shadow-lg card bg-black rounded-3 border border-secondary p-3 d-flex flex-column justify-content-between rack-card" style="height: 400px; max-width: 320px; background-color: #050505 !important;">
    
    <!-- Topo do Rack (Label) -->
    <div class="text-center text-secondary mb-2" style="font-size: 10px; letter-spacing: 2px; font-family: monospace;">
        DC-RACK-01 // UNIT A
    </div>

    <!-- Container das Baias (Servidores) -->
    <div class="flex-grow-1 d-grid gap-2" style="grid-template-columns: repeat(3, 90px); align-content: start;">
        {% for bay in hack.bays.all %}
            <!-- Baia -->
            {% include "partials/bay.html" %}
        {% endfor %}
    </div>

    <!-- Rodapé do Rack -->
    <div class="mt-2 pt-2 border-top border-secondary d-flex justify-content-between align-items-center" style="border-color: #222 !important;">
        <div class="text-secondary" style="font-size: 9px; font-family: monospace;">PWR: NORMAL</div>
        <div class="d-flex gap-1">
            <div style="width: 4px; height: 4px; background: {% if bay.is_active %}00ff00{% else %}#ff0000{% endif %}; border-radius: 50%;"></div>
            <div style="width: 4px; height: 4px; background: #333; border-radius: 50%;"></div>
            <div class="ms-auto d-flex align-items-center gap-1">
                <span class="badge bg-dark border border-secondary" style="font-size: 8px; color: #555;"></span>
            </div>
        </div>
    </div>
</div>
