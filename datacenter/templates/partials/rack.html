<style>
    @keyframes blinkGreen {
        0%   { background: #00ff00; }
        50%  { background: #003300; }
        100% { background: #00ff00; }
    }
    .blink-green {
        animation: blinkGreen 0.8s infinite;
    }

    @keyframes blinkRed {
        0%   { background: #ff0000; }
        50%  { background: #2e0000; }
        100% { background: #ff3333; }
    }
    .blink-red {
        animation: blinkRed 1s infinite;
    }
    

    .bay-card {
        height: 18%;
        background: linear-gradient(90deg, #111 0%, #1a1a1a 50%, #111 100%);
        border: 1px solid #222;
        box-shadow: inset 0 0 5px #000;
        cursor: pointer;
        transition: all .25s ease;
    }

    
    .bay-card:hover {
        border: 1px solid #d9d9d9;
        box-shadow:
        inset 0 0 8px rgba(255,255,255,.15),
        0 0 10px rgba(255,255,255,.35);
        transform: scale(1.03);
    }

    .rack-card {
        transition: all .25s ease;
    }

    .rack-card:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(255,255,255,.1);
    }

</style>

<div class="shadow-lg card bg-black rounded-3 border border-secondary p-3 d-flex flex-column justify-content-between rack-card" style="height: 400px; width: 300px; background-color: #050505 !important;">
    
    <!-- Topo do Rack (Label) -->
    <div class="text-center text-secondary mb-2" style="font-size: 10px; letter-spacing: 2px; font-family: monospace;">
        DC-RACK-01 // UNIT A
    </div>

    <!-- Container das Baias (Servidores) -->
    <div class="flex-grow-1 d-flex flex-column gap-1">
        {% for bay in hack.bays.all %}
            <!-- Baia -->
            <div hx-get="{% url 'datacenter:get_bay_detail' bay.id %}"
                 hx-target="#ModalBayBody"
                 hx-swap="innerHTML"
                 class="w-100 rounded-1 d-flex align-items-center px-2 bay-card"
                >
                <div class="rounded-circle me-2 {% if bay.is_active %}blink-green{% else %}blink-red{% endif %}" style="width: 6px; height: 6px;">
                    <label class="text-secondary" style="font-size: 8px;">{{ bay.watts }}</label>
                </div>
                <div class="rounded-circle me-2" style="width: 6px; height: 6px; background-color: #333;"></div>
                <div class="ms-auto" style="width: 30px; height: 4px; background: #222; border-radius: 2px;"></div>
                <div class="ms-auto d-flex align-items-center gap-1">
                    <i class="bi bi-power {% if bay.is_active %}text-success{% else %}text-danger{% endif %}" style="font-size: 14px;"></i>
                </div>
            </div>
        {% endfor %}
    </div>

    <!-- Rodapé do Rack -->
    <div class="mt-2 pt-2 border-top border-secondary d-flex justify-content-between align-items-center" style="border-color: #222 !important;">
        <div class="text-secondary" style="font-size: 9px; font-family: monospace;">PWR: NORMAL</div>
        <div class="d-flex gap-1">
            <div style="width: 4px; height: 4px; background: {% if bay.is_active %}00ff00{% else %}#ff0000{% endif %}; border-radius: 50%;"></div>
            <div style="width: 4px; height: 4px; background: #333; border-radius: 50%;"></div>
            <div class="ms-auto d-flex align-items-center gap-1">
                <span class="badge bg-dark border border-secondary" style="font-size: 8px; color: #555;"></span>
            </div>
        </div>
    </div>
</div>
