{% extends "base.html" %}
{% block content %}
    {% for hack in hacks %}
        {% include "partials/rack.html" %}
    {% endfor %}

    <!-- Modal único, fixo na página -->
    <div id="ModalBay"
         class="position-fixed top-0 start-0 w-100 h-100"
         style="display:none; z-index:1050; background:rgba(0,0,0,0.6);"
         onclick="if(event.target.id==='ModalBay') closeModal()">

        <div class="position-relative bg-dark border border-secondary rounded-3 p-4 mx-auto"
             style="max-width:500px; margin-top:10vh;">

            <button type="button"
                    class="btn-close btn-close-white position-absolute top-0 end-0 m-3"
                    onclick="closeModal()"></button>

            <div id="ModalBayBody">
                <!-- conteúdo injetado pelo htmx -->
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll("[data-active='True']").forEach(el => {
            el.classList.add("blink-green")
        })

        function openModal() {
            document.getElementById("ModalBay").style.display = "block";
        }
        function closeModal() {
            document.getElementById("ModalBay").style.display = "none";
        }

        document.body.addEventListener('htmx:afterSwap', (e) => {
            if (e.detail.target.id === "ModalBayBody") {
                openModal();
            }
        });
    </script>
{% endblock content %}
