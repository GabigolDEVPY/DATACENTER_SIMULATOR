<nav id="sidebar" 
     class="bg-dark border-end border-secondary sidebar-transition d-flex flex-column py-3" 
     style="width: 80px; min-width: 80px;">
    
    <!-- Botão Toggle -->
    <button id="toggleBtn" class="btn btn-outline-light mx-auto mb-4 w-75 d-flex align-items-center justify-content-center gap-2">
        <i class="bi bi-chevron-right fs-5"></i>
        <span class="sidebar-text fw-bold d-none">MENU</span>
    </button>

    <!-- Links -->
    <ul class="nav flex-column px-2 w-100">
        <li class="nav-item mb-2">
            <a href="#" class="nav-link text-white d-flex align-items-center gap-3 rounded hover-bg-secondary">
                <i class="bi bi-house-door fs-5 text-center" style="min-width: 24px;"></i>
                <span class="sidebar-text d-none">Dashboard</span>
            </a>
        </li>
        <li class="nav-item mb-2">
            <a href="{% url "datacenter:home" %}" class="nav-link text-white d-flex align-items-center gap-3 rounded">
                <i class="bi bi-hdd-rack fs-5 text-center" style="min-width: 24px;"></i>
                <span class="sidebar-text d-none">Servidores</span>
            </a>
        </li>
        <li class="nav-item mb-2">
            <a href="#" class="nav-link text-white d-flex align-items-center gap-3 rounded">
                <i class="bi bi-shield-lock fs-5 text-center" style="min-width: 24px;"></i>
                <span class="sidebar-text d-none">Segurança</span>
            </a>
        </li>
        <li class="nav-item mt-auto">
            <a href="#" class="nav-link text-white d-flex align-items-center gap-3 rounded">
                <i class="bi bi-gear fs-5 text-center" style="min-width: 24px;"></i>
                <span class="sidebar-text d-none">Config</span>
            </a>
        </li>
    </ul>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleBtn');
    const icon = toggleBtn.querySelector('i');
    const texts = document.querySelectorAll('.sidebar-text');
    let expanded = false;

    toggleBtn.addEventListener('click', () => {
        expanded = !expanded;
        
        if (expanded) {
            sidebar.style.width = '250px';
            sidebar.style.minWidth = '250px';
            icon.classList.replace('bi-chevron-right', 'bi-chevron-left');
            texts.forEach(t => t.classList.remove('d-none'));
        } else {
            sidebar.style.width = '80px';
            sidebar.style.minWidth = '80px';
            icon.classList.replace('bi-chevron-left', 'bi-chevron-right');
            texts.forEach(t => t.classList.add('d-none'));
        }
    });
});
</script>
