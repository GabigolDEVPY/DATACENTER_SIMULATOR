<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f1f3f5;
            min-height: 100vh;
        }

        .login-card {
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            border: none;
            max-width: 380px;
            width: 100%;
        }

        .login-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background-color: #e7f1ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
        }

        .btn-login {
            border-radius: 10px;
            padding: 10px;
            font-weight: 600;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.25);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="card login-card p-4 p-md-5">
        <div class="text-center mb-4">
            <div class="login-icon mx-auto mb-3">
                <i class="bi bi-shield-lock fs-4 text-primary"></i>
            </div>
            <h1 class="h4 fw-bold mb-1">Entrar</h1>
            <p class="text-muted small mb-0">Acesse sua conta para continuar</p>
        </div>

        <form method="post" action="{% url 'user:login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label for="id_username" class="form-label small fw-semibold text-secondary">Usuário</label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Seu usuário" required autofocus>
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label small fw-semibold text-secondary">Senha</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="Sua senha" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>

            <p class="text-center text-muted small mt-4 mb-0">
                Não tem uma conta?
                <a href="{% url 'user:register' %}" class="text-decoration-none fw-semibold">Criar conta</a>
            </p>
        </form>
    </div>

</body>
</html>
